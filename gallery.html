<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Alex Portfolio</title>
    <style>
        :root {
            --bg: #f8f8f8;
            --text: #111111;
            --surface: #ffffff;
            --border: #e5e5e5;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --tracking: 0.12em;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        header {
            padding: 3rem 0 2rem;
            text-align: center;
        }

        header h1 {
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 300;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        header p {
            color: #666;
            font-size: 1rem;
            max-width: 680px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .gallery-card {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            min-height: 320px;
            background: #eef0f2;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            cursor: pointer;
        }

        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-card:hover img {
            transform: scale(1.05);
        }

        .gallery-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: var(--tracking);
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 999px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--text);
            color: #fff;
        }

        .btn-primary:hover {
            background: transparent;
            color: var(--text);
            border-color: var(--text);
        }

        /* Premium Lightbox Design Overlay Window */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
            transform: scale(0.92) translateY(10px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s ease;
        }

        .lightbox.active img {
            transform: scale(1) translateY(0);
        }

        .lightbox-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            transition: all 0.25s ease;
            z-index: 2010;
            user-select: none;
        }

        .lightbox-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .lightbox-close { top: -4rem; right: 0; font-size: 1.75rem; }
        .lightbox-nav { top: 50%; transform: translateY(-50%); }
        .lightbox-prev { left: -5rem; }
        .lightbox-next { right: -5rem; }

        footer {
            text-align: center;
            color: #777;
            font-size: 0.95rem;
            padding: 2rem 0 1rem;
        }

        @media (max-width: 1200px) {
            .lightbox-close { top: 1.5rem; right: 1.5rem; }
            .lightbox-prev { left: 1rem; }
            .lightbox-next { right: 1rem; }
            .lightbox-content { width: 100%; }
        }

        @media (max-width: 992px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 680px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-actions { flex-direction: column; }
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>Full View Gallery</h1>
            <p>Browse the live database collection. Click any image to trigger focus overlay tracking mode.</p>
        </header>

        <div class="gallery-grid" id="live-gallery"></div>

        <div class="gallery-actions">
            <a href="index.html" class="btn btn-primary">Back to Home</a>
        </div>
    </main>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
        <div class="lightbox-content">
            <button class="lightbox-btn lightbox-close" aria-label="Close preview">&times;</button>
            <button class="lightbox-btn lightbox-nav lightbox-prev" aria-label="Previous image">&#10216;</button>
            <img id="lightbox-image" src="" alt="Expanded preview frame">
            <button class="lightbox-btn lightbox-nav lightbox-next" aria-label="Next image">&#10217;</button>
        </div>
    </div>

    <footer>
        © 2026 Alex. All rights reserved.
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Integrated exact configuration details straight from your dashboard image
        const firebaseConfig = {
            apiKey: "AIzaSyBLH1uMcaYzYE-gHDvw64FEgLmaRRhz5oQ",
            authDomain: "alex-97336.firebaseapp.com",
            projectId: "alex-97336",
            storageBucket: "alex-97336.firebasestorage.app",
            messagingSenderId: "521125861268",
            appId: "1:521125861268:web:01442b940cfc1b0d4be181",
            measurementId: "G-0HRPVQ90VC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const closeButton = document.querySelector('.lightbox-close');
        const prevButton = document.querySelector('.lightbox-prev');
        const nextButton = document.querySelector('.lightbox-next');

        let images = [];
        let currentIndex = 0;

        // Pull elements directly from cloud DB array mapping
        async function streamLiveGallery() {
            const grid = document.getElementById('live-gallery');
            try {
                const q = query(collection(db, "portfolio_images"), orderBy("uploadedAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                grid.innerHTML = ""; // Clear loader references
                
                if (querySnapshot.empty) {
                    grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:#888; padding:3rem 0;">No uploads index mapped yet. Visit admin dashboard page.</p>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const card = document.createElement('div');
                    card.classList.add('gallery-card');
                    card.innerHTML = `<img src="${data.url}" alt="Live database collection image">`;
                    grid.appendChild(card);
                });

                // Re-bind click event tracking index bounds parameters
                bindLightboxInteractivity();
            } catch(err) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:#cc2929;">Pipeline Error: ${err.message}</p>`;
            }
        }

        function updateLightboxImage(index) {
            if (index < 0) index = images.length - 1;
            if (index >= images.length) index = 0;
            
            currentIndex = index;
            lightboxImage.style.opacity = '0';
            setTimeout(() => {
                lightboxImage.src = images[currentIndex].src;
                lightboxImage.alt = images[currentIndex].alt;
                lightboxImage.style.opacity = '1';
            }, 120);
        }

        function bindLightboxInteractivity() {
            images = Array.from(document.querySelectorAll('.gallery-card img'));
            const cards = Array.from(document.querySelectorAll('.gallery-card'));

            cards.forEach((card, index) => {
                card.addEventListener('click', () => {
                    updateLightboxImage(index);
                    lightbox.classList.add('active');
                    document.body.style.overflow = 'hidden';
                });
            });
        }

        const closeLightbox = () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        };

        closeButton.addEventListener('click', closeLightbox);
        nextButton.addEventListener('click', (e) => { e.stopPropagation(); updateLightboxImage(currentIndex + 1); });
        prevButton.addEventListener('click', (e) => { e.stopPropagation(); updateLightboxImage(currentIndex - 1); });

        lightbox.addEventListener('click', (event) => {
            if (event.target === lightbox || event.target.classList.contains('lightbox-content')) closeLightbox();
        });

        document.addEventListener('keydown', (event) => {
            if (!lightbox.classList.contains('active')) return;
            if (event.key === 'Escape') closeLightbox();
            if (event.key === 'ArrowRight') updateLightboxImage(currentIndex + 1);
            if (event.key === 'ArrowLeft') updateLightboxImage(currentIndex - 1);
        });

        // Initialize engine parse execution trigger
        streamLiveGallery();
    </script>
</body>
</html>
