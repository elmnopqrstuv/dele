<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Alex Portfolio</title>
    <style>
        :root {
            --bg: #fdfdfd;
            --text: #121212;
            --text-muted: #666666;
            --surface: #ffffff;
            --border: #e5e5e5;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 420px;
            transition: all 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        input[type="email"],
        input[type="password"],
        input[type="file"] {
            width: 100%;
            padding: 0.9rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            background: #f9f9f9;
            outline: none;
        }

        input:focus {
            border-color: var(--text);
            background: #fff;
        }

        button {
            width: 100%;
            padding: 1rem;
            background-color: var(--text);
            color: var(--bg);
            border: 1px solid var(--text);
            border-radius: 8px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        button:hover {
            background-color: transparent;
            color: var(--text);
        }

        .logout-btn {
            background: transparent;
            color: #cc2929;
            border-color: #cc2929;
            margin-top: 2rem;
        }

        .logout-btn:hover {
            background: #cc2929;
            color: white;
        }

        .status {
            margin-top: 1.25rem;
            font-size: 0.88rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="login-section" class="card">
        <h2>Admin Login</h2>
        <input type="email" id="email" placeholder="Secret Admin Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button id="login-btn">Access Dashboard</button>
        <div id="login-status" class="status"></div>
    </div>

    <div id="upload-section" class="card hidden">
        <h2>Upload to Gallery</h2>
        <input type="file" id="image-file" accept="image/*">
        <button id="upload-btn">Upload Image</button>
        
        <button id="logout-btn" class="logout-btn">Log Out</button>
        <div id="upload-status" class="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // Integrated exact configuration details straight from your dashboard image
        const firebaseConfig = {
            apiKey: "AIzaSyBLH1uMcaYzYE-gHDvw64FEgLmaRRhz5oQ",
            authDomain: "alex-97336.firebaseapp.com",
            projectId: "alex-97336",
            storageBucket: "alex-97336.firebasestorage.app",
            messagingSenderId: "521125861268",
            appId: "1:521125861268:web:01442b940cfc1b0d4be181",
            measurementId: "G-0HRPVQ90VC"
        };

        // Initialize App Context Instances
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const storage = getStorage(app);
        const db = getFirestore(app);

        const loginSection = document.getElementById('login-section');
        const uploadSection = document.getElementById('upload-section');

        // Watchman function keeping unauthenticated users out
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.classList.add('hidden');
                uploadSection.classList.remove('hidden');
                document.getElementById('upload-status').innerText = "";
            } else {
                loginSection.classList.remove('hidden');
                uploadSection.classList.add('hidden');
                document.getElementById('login-status').innerText = "";
            }
        });

        // Sign In Execution 
        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const status = document.getElementById('login-status');
            
            if(!email || !password) return status.innerText = "Please complete all login fields.";
            status.innerText = "Verifying credentials...";

            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                status.style.color = "#cc2929";
                status.innerText = "Error: Invalid entry configuration.";
            }
        });

        // Live Upload Image Pipeline
        document.getElementById('upload-btn').addEventListener('click', async () => {
            const fileInput = document.getElementById('image-file');
            const file = fileInput.files[0];
            const status = document.getElementById('upload-status');
            
            if (!file) return status.innerText = "Select an image file to process.";

            status.style.color = "var(--text-muted)";
            status.innerText = "Processing & Uploading file payload to storage bucket...";

            try {
                // Step 1: Write file bits safely into Cloud Storage bucket tracking
                const uniqueName = Date.now() + '-' + file.name;
                const storageRef = ref(storage, 'gallery/' + uniqueName);
                
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);

                // Step 2: Bind download URL to structured Firestore data document entry
                await addDoc(collection(db, "portfolio_images"), {
                    url: downloadURL,
                    uploadedAt: new Date()
                });

                status.style.color = "#2b8a3e";
                status.innerText = "Success! Image added to gallery matrix index.";
                fileInput.value = ""; // Flush selected tracking variable
            } catch (error) {
                status.style.color = "#cc2929";
                status.innerText = "Upload Execution Halted: " + error.message;
            }
        });

        // Log out clean wipe
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
