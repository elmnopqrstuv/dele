<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Alex Portfolio</title>
    <style>
        :root {
            --bg: #f8f8f8;
            --text: #111111;
            --surface: #ffffff;
            --border: #e5e5e5;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --tracking: 0.12em;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        header {
            padding: 3rem 0 2rem;
            text-align: center;
        }

        header h1 {
            font-size: clamp(2.5rem, 4vw, 4rem);
            font-weight: 300;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        header p {
            color: #666;
            font-size: 1rem;
            max-width: 680px;
            margin: 0 auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .gallery-card {
            position: relative;
            overflow: hidden;
            border-radius: 24px;
            min-height: 320px;
            background: #000;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
        }

        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .gallery-card:hover img {
            transform: scale(1.05);
        }

        .gallery-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 2rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: var(--tracking);
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 999px;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--text);
            color: #fff;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border-color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--text);
            color: #fff;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.88);
            z-index: 1000;
            padding: 1.5rem;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .lightbox-close {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            width: 3rem;
            height: 3rem;
            border: none;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.14);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s ease;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        footer {
            text-align: center;
            color: #777;
            font-size: 0.95rem;
            padding: 2rem 0 1rem;
        }

        @media (max-width: 992px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 680px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .gallery-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <header>
            <h1>Full View Gallery</h1>
            <p>Browse the full collection. Click any image to enlarge it.</p>
        </header>

        <div class="gallery-grid">
            <div class="gallery-card"><img src="pics/s1.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s2.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s3.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s4.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s5.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s11.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s6.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s7.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s8.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s9.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s10.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s12.jfif" alt="Gallery image"></div>
            <div class="gallery-card"><img src="pics/s13.jfif" alt="Gallery image"></div>
        </div>

        <div class="gallery-actions">
            <a href="index.html" class="btn btn-primary">Back to Home</a>
        </div>
    </main>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image preview">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close preview">&times;</button>
        <img id="lightbox-image" src="" alt="Expanded gallery image">
    </div>

    <footer>
        © 2026 Alex. All rights reserved.
    </footer>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImage = document.getElementById('lightbox-image');
        const closeButton = document.getElementById('lightbox-close');

        document.querySelectorAll('.gallery-card img').forEach((img) => {
            img.addEventListener('click', () => {
                lightboxImage.src = img.src;
                lightboxImage.alt = img.alt;
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            });
        });

        const closeLightbox = () => {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        };

        closeButton.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (event) => {
            if (event.target === lightbox) {
                closeLightbox();
            }
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeLightbox();
            }
        });
    </script>
</body>
</html>
